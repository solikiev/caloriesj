<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CaloriesJ" />
  <title>CaloriesJ</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-192x192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-4 md:p-6 pb-24">
    <header class="mb-6">
      <h1 class="text-3xl md:text-4xl font-bold tracking-tight">Calorie & Carb Tracker</h1>
      <p class="text-slate-400 mt-2">Track daily targets, log meals, and review history by month.</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <section class="lg:col-span-1 space-y-6">
        <div class="card">
          <h2 class="section-title">Target Ranges</h2>
          <div class="space-y-4">
            <div>
              <label class="label">Calories Target Range</label>
              <div class="grid grid-cols-2 gap-3">
                <input id="calMin" type="number" min="0" class="input" placeholder="Min" />
                <input id="calMax" type="number" min="0" class="input" placeholder="Max" />
              </div>
            </div>
            <div>
              <label class="label">Carbs Target Range (g)</label>
              <div class="grid grid-cols-2 gap-3">
                <input id="carbMin" type="number" min="0" class="input" placeholder="Min" />
                <input id="carbMax" type="number" min="0" class="input" placeholder="Max" />
              </div>
            </div>
            <button id="saveTargetsBtn" class="btn btn-primary w-full">Save Targets</button>
          </div>
        </div>

        <div class="card">
          <h2 class="section-title">Selected Date</h2>
          <div class="flex items-center gap-3">
            <input id="selectedDate" type="date" class="input flex-1" />
            <button id="todayBtn" class="btn btn-secondary">Today</button>
          </div>
        </div>

        <div class="card">
          <h2 class="section-title">Add Food Entry</h2>
          <div class="space-y-3">
            <input id="foodName" type="text" class="input" placeholder="Food name" />
            <div class="grid grid-cols-2 gap-3">
              <input id="foodCalories" type="number" min="0" class="input" placeholder="Calories" />
              <input id="foodCarbs" type="number" min="0" class="input" placeholder="Carbs (g)" />
            </div>
            <button id="addEntryBtn" class="btn btn-primary w-full">Add Entry</button>
          </div>
        </div>

        <div class="card">
          <h2 class="section-title">Daily Summary</h2>
          <div id="dailySummary" class="space-y-3"></div>
        </div>
      </section>

      <section class="lg:col-span-1 space-y-6">
        <div class="card">
          <h2 class="section-title mb-4">Entries for Selected Day</h2>
          <div id="entriesList" class="space-y-3"></div>
        </div>
      </section>

      <section class="lg:col-span-1 space-y-6">
        <div class="card">
          <div class="flex items-center justify-between mb-4">
            <button id="prevMonthBtn" class="btn btn-secondary" aria-label="Previous month">←</button>
            <h2 id="calendarMonthLabel" class="text-lg font-semibold"></h2>
            <button id="nextMonthBtn" class="btn btn-secondary" aria-label="Next month">→</button>
          </div>
          <div class="grid grid-cols-7 gap-2 text-center text-xs text-slate-400 mb-2">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
          </div>
          <div id="calendarGrid" class="grid grid-cols-7 gap-2"></div>
        </div>

        <div class="card">
          <h2 class="section-title">Legend</h2>
          <div class="flex flex-wrap gap-3 text-sm">
            <span class="legend legend-green">Green: in range</span>
            <span class="legend legend-yellow">Yellow: below min</span>
            <span class="legend legend-red">Red: above max</span>
          </div>
        </div>
      </section>
    </div>
  </div>

  <div id="editModal" class="modal hidden" aria-hidden="true">
    <div class="modal-content">
      <h3 class="text-xl font-semibold mb-4">Edit Entry</h3>
      <input id="editFoodName" type="text" class="input mb-3" />
      <div class="grid grid-cols-2 gap-3 mb-4">
        <input id="editFoodCalories" type="number" min="0" class="input" />
        <input id="editFoodCarbs" type="number" min="0" class="input" />
      </div>
      <div class="flex gap-3 justify-end">
        <button id="cancelEditBtn" class="btn btn-secondary">Cancel</button>
        <button id="saveEditBtn" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
